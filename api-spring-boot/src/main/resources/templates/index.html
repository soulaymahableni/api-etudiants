<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liste des Étudiants</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #333;
            padding: 2rem;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #1a1a2e;
        }

        #status {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 1rem;
        }

        #status.erreur { color: #c0392b; }
        #status.succes { color: #27ae60; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        thead {
            background: #2c3e7a;
            color: #fff;
        }

        thead th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.03em;
        }

        tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.15s;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f7f9ff; }

        tbody td {
            padding: 11px 16px;
            font-size: 0.92rem;
            color: #444;
        }

        .badge-age {
            display: inline-block;
            background: #eef2ff;
            color: #2c3e7a;
            font-weight: 600;
            font-size: 0.82rem;
            padding: 2px 10px;
            border-radius: 12px;
        }

        #vide {
            display: none;
            text-align: center;
            padding: 2rem;
            color: #999;
            font-size: 0.95rem;
            background: #fff;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>Liste des Étudiants</h1>
<p id="status">Chargement en cours…</p>

<table id="tableau" style="display:none;">
    <thead>
    <tr>
        <th>#</th>
        <th>CIN</th>
        <th>Nom</th>
        <th>Date de naissance</th>
        <th>Âge</th>
    </tr>
    </thead>
    <tbody id="corps"></tbody>
</table>

<div id="vide">Aucun étudiant trouvé.</div>

<script>
    fetch('/api/etudiants')
        .then(function(res) {
            if (!res.ok) {
                throw new Error('Erreur HTTP : ' + res.status);
            }
            return res.json();
        })
        .then(function(etudiants) {
            var status  = document.getElementById('status');
            var tableau = document.getElementById('tableau');
            var corps   = document.getElementById('corps');
            var vide    = document.getElementById('vide');

            if (etudiants.length === 0) {
                status.textContent = '';
                vide.style.display = 'block';
                return;
            }

            etudiants.forEach(function(etudiant, index) {
                var ligne = document.createElement('tr');

                // Calcul de l'âge côté client à partir de dateNaissance
                var age = '';
                if (etudiant.dateNaissance) {
                    var naissance = new Date(etudiant.dateNaissance);
                    var auj = new Date();
                    var ans = auj.getFullYear() - naissance.getFullYear();
                    var mois = auj.getMonth() - naissance.getMonth();
                    if (mois < 0 || (mois === 0 && auj.getDate() < naissance.getDate())) {
                        ans--;
                    }
                    age = ans;
                }

                ligne.innerHTML =
                    '<td>' + (index + 1) + '</td>' +
                    '<td>' + (etudiant.cin  || '—') + '</td>' +
                    '<td>' + (etudiant.nom  || '—') + '</td>' +
                    '<td>' + (etudiant.dateNaissance || '—') + '</td>' +
                    '<td><span class="badge-age">' + (age !== '' ? age + ' ans' : '—') + '</span></td>';

                corps.appendChild(ligne);
            });

            status.textContent = etudiants.length + ' étudiant(s) chargé(s).';
            status.className = 'succes';
            tableau.style.display = 'table';
        })
        .catch(function(err) {
            var status = document.getElementById('status');
            status.textContent = 'Impossible de charger les données : ' + err.message;
            status.className = 'erreur';
            console.error(err);
        });
</script>

</body>
</html>
