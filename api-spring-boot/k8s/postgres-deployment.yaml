apiVersion: apps/v1
kind: Deployment
metadata:
  name: etudiant-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etudiant-postgres
  template:
    metadata:
      labels:
        app: etudiant-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "1234"
        - name: POSTGRES_DB
          value: "etudiants"
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: etudiant-postgres
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
  type: ClusterIP
